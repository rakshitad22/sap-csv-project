<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(to right, #141e30, #243b55);
            font-family: Arial, sans-serif;
        }

        .login-card{
            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 25px rgba(0,0,0,0.3);
        }

        .title{
            text-align:center;
            font-size:32px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:30px;
        }

        .form-control{
            height:50px;
            border-radius:10px;
        }

        .btn-login{
            height:50px;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
            background:#0d6efd;
            border:none;
        }

        .bottom-text{
            text-align:center;
            margin-top:20px;
        }

        .bottom-text a{
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="title">
        Welcome Back
    </div>

    <div class="subtitle">
        Login to continue
    </div>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <input type="text"
                   class="form-control"
                   name="username"
                   placeholder="Enter Username"
                   required>
        </div>

        <div class="mb-4">
            <input type="password"
                   class="form-control"
                   name="password"
                   placeholder="Enter Password"
                   required>
        </div>

        <button type="submit"
                class="btn btn-primary btn-login w-100">

            Login

        </button>

    </form>

    <div class="bottom-text">

        New User?
        <a href="/register/">
            Create Account
        </a>

    </div>

</div>

</body>
</html>
