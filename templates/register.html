<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(to right, #42275a, #734b6d);
            font-family: Arial, sans-serif;
        }

        .register-card{
            width:420px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 25px rgba(0,0,0,0.3);
        }

        .title{
            text-align:center;
            font-size:32px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:30px;
        }

        .form-control{
            height:50px;
            border-radius:10px;
        }

        .btn-register{
            height:50px;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
            background:#6f42c1;
            border:none;
            color:white;
        }

        .bottom-text{
            text-align:center;
            margin-top:20px;
        }

        .bottom-text a{
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="register-card">

    <div class="title">
        Create Account
    </div>

    <div class="subtitle">
        Register to continue
    </div>

    {% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <input type="text"
                   class="form-control"
                   name="username"
                   placeholder="Enter Username"
                   required>
        </div>

        <div class="mb-3">
            <input type="email"
                   class="form-control"
                   name="email"
                   placeholder="Enter Email"
                   required>
        </div>

        <div class="mb-4">
            <input type="password"
                   class="form-control"
                   name="password"
                   placeholder="Enter Password"
                   required>
        </div>

        <button type="submit"
                class="btn btn-register w-100">

            Register

        </button>

    </form>

    <div class="bottom-text">

        Already have account?
        <a href="/">
            Login
        </a>

    </div>

</div>

</body>
</html>
