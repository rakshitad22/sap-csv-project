<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:40px;
            min-height:100vh;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            font-family: Arial, sans-serif;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
        }

        .welcome{
            color:white;
            font-size:30px;
            font-weight:bold;
        }

        .card-box{
            background:white;
            border-radius:20px;
            padding:35px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
            margin-bottom:30px;
        }

        .form-control{
            height:50px;
            border-radius:10px;
        }

        .btn-download{
            height:50px;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
        }

        table{
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="top-bar">

        <div class="welcome">
            Welcome, {{ request.user.username }}
        </div>

        <a href="/logout/" class="btn btn-danger">
            Logout
        </a>

    </div>

    <div class="card-box">

        <h2 class="text-center mb-4">
            CSV Generator
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-4">

                <input type="text"
                       class="form-control"
                       name="name"
                       placeholder="Enter Your Name"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-primary btn-download w-100">

                Download CSV

            </button>

        </form>

    </div>

    <div class="card-box">

        <h3>
            Download History
        </h3>

        <table class="table table-bordered">

            <thead class="table-dark">

                <tr>
                    <th>Name</th>
                    <th>Date</th>
                </tr>

            </thead>

            <tbody>

                {% for item in data %}

                <tr>
                    <td>{{ item.entered_name }}</td>
                    <td>{{ item.created_at }}</td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
