<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OTP Verification</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(to right, #141e30, #243b55);
            font-family: Arial, sans-serif;
        }

        .otp-card{
            width:420px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 25px rgba(0,0,0,0.3);
        }

        .title{
            text-align:center;
            font-size:30px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:30px;
        }

        .otp-input{
            height:60px;
            text-align:center;
            font-size:22px;
            border-radius:10px;
        }

    </style>

</head>

<body>

<div class="otp-card">

    <div class="title">
    Verify OTP
</div>

<div class="subtitle">
    Enter OTP sent to your email
</div>

</div>

    {% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="otp"
               class="form-control otp-input mb-4"
               placeholder="Enter OTP"
               required>

        <button type="submit"
                class="btn btn-primary w-100">

            Verify OTP

        </button>

    </form>

</div>

</body>
</html>
